<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JWM Pricing Platform</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/cotizacion.css">
<link rel="stylesheet" href="css/drivers.css">
<link rel="stylesheet" href="css/resultado.css">
<link rel="stylesheet" href="css/historial.css">
<link rel="stylesheet" href="css/resumen.css">
<link rel="stylesheet" href="css/usuarios.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<section id="loginPanel" class="login-panel">
    <div class="login-card">
        <img src="assets/logo-jwm.jpg" alt="JWM">
        <span class="section-label">Acceso seguro</span>
        <h1>JWM Pricing Platform</h1>
        <form id="formLogin" onsubmit="iniciarSesionDesdeFormulario(event)">
            <label for="loginEmail">Correo</label>
            <input type="email" id="loginEmail" autocomplete="username" required>
            <label for="loginPassword">Contrasena</label>
            <input type="password" id="loginPassword" autocomplete="current-password" required>
            <button type="submit">Ingresar</button>
            <p id="loginMensaje" class="login-message"></p>
        </form>
    </div>
</section>

<div class="container">
    <aside class="sidebar">
        <div class="logo">
            <img src="assets/logo-jwm.jpg" alt="JWM">
            <span>Pricing Platform</span>
        </div>
        <div class="user-box">
            <strong id="usuarioNombre">-</strong>
            <span id="usuarioRol">-</span>
            <button type="button" onclick="cerrarSesion()">Cerrar sesion</button>
        </div>
        <nav>
            <ul>
                <li class="menu-item active" data-screen="cotizacion" data-roles="admin,comercial" onclick="mostrarPantalla('cotizacion')">Nueva Cotizacion</li>
                <li class="menu-item" data-screen="resultado" data-roles="admin,comercial" onclick="mostrarPantalla('resultado')">Resultado</li>
                <li class="menu-item" data-screen="resumen" data-roles="admin,comercial,consulta" onclick="mostrarPantalla('resumen')">Resumen Ejecutivo</li>
                <li class="menu-item" data-screen="historial" data-roles="admin,comercial,consulta" onclick="mostrarPantalla('historial')">Historial</li>
                <li class="menu-item" data-screen="drivers" data-roles="admin" onclick="mostrarPantalla('drivers')">Drivers</li>
                <li class="menu-item" data-screen="usuarios" data-roles="admin" onclick="mostrarPantalla('usuarios')">Usuarios</li>
            </ul>
        </nav>
    </aside>

    <main class="main">
        <div id="pantalla-cotizacion" data-view="views/cotizacion.html"></div>
        <div id="pantalla-resultado" data-view="views/resultado.html" style="display:none;"></div>
        <div id="pantalla-historial" data-view="views/historial.html" style="display:none;"></div>
        <div id="pantalla-resumen" data-view="views/resumen.html" style="display:none;"></div>
        <div id="pantalla-drivers" data-view="views/drivers.html" style="display:none;"></div>
        <div id="pantalla-usuarios" data-view="views/usuarios.html" style="display:none;"></div>
    </main>
</div>

<script src="vendor/xlsx.full.min.js?v=20260706"></script>
<script src="js/api.js?v=20260706"></script>
<script src="js/utilidades.js?v=20260706"></script>
<script src="js/cotizacion.js?v=20260706"></script>
<script src="js/drivers.js?v=20260706"></script>
<script src="js/resultado.js?v=20260706"></script>
<script src="js/historial.js?v=20260706"></script>
<script src="js/resumen.js?v=20260706"></script>
<script src="js/excel.js?v=20260706"></script>
<script src="js/pdf.js?v=20260706"></script>
<script src="js/auth.js?v=20260706"></script>
<script src="js/usuarios.js?v=20260706"></script>
<script src="js/app.js?v=20260706"></script>
</body>
</html>
