<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JWM Pricing Platform</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/cotizacion.css">
<link rel="stylesheet" href="css/drivers.css">
<link rel="stylesheet" href="css/resultado.css">
<link rel="stylesheet" href="css/historial.css">
<link rel="stylesheet" href="css/resumen.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <aside class="sidebar">
        <div class="logo">
            <img src="assets/logo-jwm.jpg" alt="JWM">
            <span>Pricing Platform</span>
        </div>
        <nav>
            <ul>
                <li class="menu-item active" onclick="mostrarPantalla('cotizacion')">Nueva Cotizacion</li>
                <li class="menu-item" onclick="mostrarPantalla('resultado')">Resultado</li>
                <li class="menu-item" onclick="mostrarPantalla('resumen')">Resumen Ejecutivo</li>
                <li class="menu-item" onclick="mostrarPantalla('historial')">Historial</li>
                <li class="menu-item" onclick="mostrarPantalla('drivers')">Drivers</li>
            </ul>
        </nav>
    </aside>

    <main class="main">
        <div id="pantalla-cotizacion" data-view="views/cotizacion.html"></div>
        <div id="pantalla-resultado" data-view="views/resultado.html" style="display:none;"></div>
        <div id="pantalla-historial" data-view="views/historial.html" style="display:none;"></div>
        <div id="pantalla-resumen" data-view="views/resumen.html" style="display:none;"></div>
        <div id="pantalla-drivers" data-view="views/drivers.html" style="display:none;"></div>
    </main>
</div>

<script src="vendor/xlsx.full.min.js"></script>
<script src="js/api.js"></script>
<script src="js/utilidades.js"></script>
<script src="js/cotizacion.js"></script>
<script src="js/drivers.js"></script>
<script src="js/resultado.js"></script>
<script src="js/historial.js"></script>
<script src="js/resumen.js"></script>
<script src="js/excel.js"></script>
<script src="js/pdf.js"></script>
<script src="js/app.js"></script>
</body>
</html>
